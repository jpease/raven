[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "B",
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "SIM",
    "UP",
]

[tool.ruff.format]
line-ending = "auto"
quote-style = "preserve"

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "standard"
reportMissingTypeStubs = false
# Tests import the installer package from scripts/ after a sys.path insert.
extraPaths = ["scripts"]
