name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    if: github.event_name != 'schedule'
    name: Checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install check tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pyright pytest

      - name: ruff format check
        run: python -m ruff format --check .

      - name: ruff lint
        run: python -m ruff check .

      - name: pyright
        run: pyright

      - name: Unit tests
        run: python -m pytest tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"

  self-check:
    name: Self-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install self-check tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest

      - name: Self-check
        run: python scripts/self-check.py
        env:
          RAVEN_SELF_CHECK_STRICT_FRESHNESS: ${{ github.event_name == 'schedule' && '1' || '0' }}

  template-smoke:
    if: github.event_name != 'schedule'
    name: Template smoke (${{ matrix.template }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        template: [python, typescript, go, rust, swift, elixir, lua, dotfiles]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install and dry-run upgrade template
        run: |
          destination="${RUNNER_TEMP}/raven-smoke-${{ matrix.template }}"
          mkdir -p "$destination"
          python scripts/raven.py --destination "$destination" install "${{ matrix.template }}" --platform github
          python scripts/raven.py --destination "$destination" upgrade --dry-run
