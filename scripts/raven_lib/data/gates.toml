# Per-language gate expectations consumed by `raven assess`.
# Each [<template>] entry declares the justfile recipes, gate tool ids,
# tool-config signals, language-detection signals, and non-just fallback
# commands for that template. Keep recipe names in sync with <template>/justfile.

[python]
recipes = ["lint", "format", "typecheck", "test"]
tools = ["ruff", "pyright"]
detect_signals = ["pyproject.toml", "setup.py", "setup.cfg"]
# config_signals: each entry is [file, required_substring]; substring "" means
# "file must merely exist".
config_signals = [["pyproject.toml", "[tool.ruff]"]]

[python.fallback_commands]
lint = ["ruff", "check", "."]
format = ["ruff", "format", "--check", "."]
typecheck = ["pyright"]
test = ["python", "-m", "pytest"]

[go]
recipes = ["fmt-check", "vet", "lint", "test"]
tools = ["golangci-lint", "gofmt"]
detect_signals = ["go.mod", "go.sum"]
config_signals = [["go.mod", ""]]

[go.fallback_commands]
fmt-check = ["gofmt", "-l", "."]
vet = ["go", "vet", "./..."]
lint = ["golangci-lint", "run"]
test = ["go", "test", "./..."]

[rust]
recipes = ["lint", "typecheck", "test"]
tools = ["cargo"]
detect_signals = ["Cargo.toml", "Cargo.lock"]
config_signals = [["Cargo.toml", ""]]

[rust.fallback_commands]
lint = ["cargo", "clippy", "--", "-D", "warnings"]
typecheck = ["cargo", "check"]
test = ["cargo", "test"]

[typescript]
recipes = ["lint", "typecheck", "test"]
tools = ["npx"]
detect_signals = ["package.json", "tsconfig.json"]
config_signals = [["tsconfig.json", ""]]

[typescript.fallback_commands]
lint = ["npx", "eslint", "."]
typecheck = ["npx", "tsc", "--noEmit"]
test = ["npx", "vitest", "run"]

[swift]
recipes = ["lint", "build", "test"]
tools = ["swift", "swiftlint"]
detect_signals = ["Package.swift"]
config_signals = [["Package.swift", ""]]

[swift.fallback_commands]
lint = ["swiftlint", "lint"]
build = ["swift", "build"]
test = ["swift", "test"]

[elixir]
recipes = ["lint", "typecheck", "test"]
tools = ["mix"]
detect_signals = ["mix.exs"]
config_signals = [["mix.exs", ""]]

[elixir.fallback_commands]
lint = ["mix", "credo"]
typecheck = ["mix", "dialyzer"]
test = ["mix", "test"]

[lua]
recipes = ["fmt-check", "lint", "test"]
tools = ["luacheck", "stylua", "busted"]
detect_signals = [".luacheckrc", ".busted"]
config_signals = [[".luacheckrc", ""]]

[lua.fallback_commands]
fmt-check = ["stylua", "--check", "."]
lint = ["luacheck", "."]
test = ["busted"]
